<!DOCTYPE html>
<html lang="es">

<head>
  <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo | Dotacian</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <style>
    .article-header {
      background: linear-gradient(135deg, #020617 0%, #0F172A 100%);
      padding: 8rem 2rem 6rem 2rem;
      color: white;
      text-align: center;
      position: relative;
      margin-top: 144px;
      overflow: hidden;
    }

    .article-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -10%;
      width: 50%;
      height: 150%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
      transform: rotate(-45deg);
      pointer-events: none;
    }

    .article-header::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 40%;
      height: 100%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .article-back {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      transition: color 0.2s;
      z-index: 10;
    }

    .article-back:hover {
      color: white;
    }

    .article-meta {
      font-size: 0.95rem;
      color: var(--color-cyan);
      margin-bottom: 1rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-weight: 500;
    }

    .article-title {
      font-family: var(--font-family-heading);
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.2;
      max-width: 900px;
      margin: 0 auto 2rem auto;
      position: relative;
      z-index: 10;
      letter-spacing: -0.02em;
    }

    .article-hero-image {
      width: 100%;
      max-width: 1000px;
      height: 400px;
      object-fit: cover;
      border-radius: 1rem;
      margin: -2rem auto 3rem auto;
      display: block;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 10;
      background: #E2E8F0;
    }

    .article-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      font-size: 1.125rem;
      line-height: 1.8;
      color: var(--color-text-primary);
    }

    .article-content h2 {
      font-family: var(--font-family-heading);
      font-size: 2rem;
      color: var(--color-navy);
      margin: 2.5rem 0 1rem 0;
    }

    .article-content p {
      margin-bottom: 1.5rem;
    }

    .article-content img {
      max-width: 100%;
      height: auto;
      border-radius: 0.5rem;
      margin: 2rem 0;
    }

    .article-content ul,
    .article-content ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    .article-content li {
      margin-bottom: 0.5rem;
    }

    .article-content blockquote {
      border-left: 4px solid var(--color-cyan);
      padding-left: 1.5rem;
      font-style: italic;
      color: var(--color-text-secondary);
      margin: 2rem 0;
      font-size: 1.25rem;
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="container">
      <div class="logo">
        <a href="index.html">
          <img src="assets/logos/logo_dotacian.png" alt="dotacian logo"
            style="height: 80px; width: auto; display: block;">
        </a>
      </div>
      <nav class="nav-links">
        <a href="index.html#problema">Problema</a>
        <a href="index.html#solucion">Solución</a>
        <a href="index.html#precios">Precios</a>
        <a href="index.html#fabricante">Fabricantes</a>
        <a href="blog.html" style="color: var(--color-brand-primary); font-weight: 600;">Blog</a>
      </nav>
      <div class="header-actions">
        <a href="login.html" style="font-weight: 600; color: var(--color-text-secondary); transition: color 0.2s;"
          onmouseover="this.style.color='var(--color-brand-primary)'"
          onmouseout="this.style.color='var(--color-text-secondary)'">Iniciar sesión</a>
        <a href="onboarding.html" class="btn btn-primary" style="padding: 0.6rem 1.25rem; font-size: 0.9rem;">Crea tu
          cuenta</a>
        <button class="header-mobile-toggle" id="mobile-menu-toggle" aria-label="Abrir menú">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-header">
      <div class="logo" style="display: flex; align-items: center;">
        <img src="assets/logos/logo_dotacian.png" alt="dotacian logo"
          style="height: 45px; width: auto; display: block;">
      </div>
      <button class="drawer-close" id="drawer-close">&times;</button>
    </div>
    <nav class="drawer-nav">
      <a href="index.html#problema">Problema</a>
      <a href="index.html#solucion">Solución</a>
      <a href="index.html#precios">Precios</a>
      <a href="index.html#fabricante">Fabricante</a>
      <a href="blog.html">Blog</a>
      <div class="drawer-divider"></div>
      <a href="login.html">Iniciar sesión</a>
      <a href="onboarding.html" class="btn btn-primary">Crea tu cuenta</a>
    </nav>
  </div>

  <div id="article-container">
    <div style="text-align: center; padding: 6rem; color: var(--color-text-muted);">
      Cargando artículo...
    </div>
  </div>

  <!-- Footer Simple -->
  <footer
    style="background: #0F172A; color: white; padding: 4rem 2rem 2rem 2rem; text-align: center; margin-top: 4rem;">
    <div style="max-width: 1200px; margin: 0 auto;">
      <img src="assets/logos/logo_dotacian.png" alt="Dotacian" style="height: 40px; margin-bottom: 1.5rem;">
      <p style="color: rgba(255,255,255,0.6); font-size: 0.875rem;">© 2026 Dotacian. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://awuhvewotmwelurmjvmu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4WG86Fal8RQ3tV0sNXZIow_hikHt0Aq';
    const _supabaseBlog = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Mobile Drawer Logic
    const toggleBtn = document.getElementById('mobile-menu-toggle');
    const closeBtn = document.getElementById('drawer-close');
    const drawer = document.getElementById('mobile-drawer');

    const toggleMenu = () => {
      drawer.classList.toggle('active');
      toggleBtn.classList.toggle('open');
      document.body.style.overflow = drawer.classList.contains('active') ? 'hidden' : '';
    };

    if (toggleBtn) toggleBtn.addEventListener('click', toggleMenu);
    if (closeBtn) closeBtn.addEventListener('click', () => {
      drawer.classList.remove('active');
      toggleBtn.classList.remove('open');
      document.body.style.overflow = '';
    });

    async function loadArticle() {
      const container = document.getElementById('article-container');
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('slug');

      if (!slug) {
        container.innerHTML = `
          <div style="text-align: center; padding: 6rem; color: #EF4444;">
            Artículo no encontrado. <a href="blog.html" style="color: var(--color-cyan);">Volver al blog</a>
          </div>
        `;
        return;
      }

      try {
        const { data: post, error } = await _supabaseBlog
          .from('blog_posts')
          .select('*')
          .eq('slug', slug)
          .single();

        if (error || !post) {
          throw error || new Error("Not found");
        }

        // --- View Tracking Logic ---
        const viewKey = `viewed_article_${post.id}`;
        const hasViewed = localStorage.getItem(viewKey);

        let newTotal = (post.views_total || 0) + 1;
        let newUnique = post.views_unique || 0;

        if (!hasViewed) {
          newUnique += 1;
          localStorage.setItem(viewKey, 'true');
        }

        // Update without blocking page load
        _supabaseBlog.from('blog_posts').update({
          views_total: newTotal,
          views_unique: newUnique
        }).eq('id', post.id).then(({ error }) => {
          if (error) console.error("Error updating views", error);
        });
        // ---------------------------

        const dateObj = new Date(post.created_at);
        const dateString = dateObj.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        const imageSrc = post.image_url ? post.image_url : 'assets/images/hero_image.png';

        document.title = `${post.title} | Blog Dotacian`;

        container.innerHTML = `
          <section class="article-header">
            <a href="blog.html" class="article-back">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
              Volver
            </a>
            <div class="article-meta">
              <span>${dateString}</span>
              <span>•</span>
              <span>Por ${post.author || 'Equipo Dotacian'}</span>
            </div>
            <h1 class="article-title">${post.title}</h1>
          </section>

          <img src="${imageSrc}" alt="${post.title}" class="article-hero-image">

          <article class="article-content">
            <!-- Para un MVP, renderizamos el HTML directamente si el admin lo escribió así, 
                 o reemplazamos los saltos de línea por <br> si es texto plano -->
            ${post.content.includes('<') ? post.content : post.content.replace(/\\n/g, '<br><br>')}
          </article>
        `;
      } catch (err) {
        console.error('Error loading article:', err);
        container.innerHTML = `
          <div style="text-align: center; padding: 6rem; color: #EF4444;">
            El artículo no existe o hubo un error al cargarlo. <br><br>
            <a href="blog.html" style="color: var(--color-cyan); font-weight: bold; text-decoration: none;">Volver al blog</a>
          </div>
        `;
      }
    }

    document.addEventListener('DOMContentLoaded', loadArticle);
  </script>
</body>

</html>
