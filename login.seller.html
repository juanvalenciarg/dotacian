<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Login | dotacian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">
          <a href="index.html">
            <img src="assets/logos/logo_dotacian_seller.png" alt="dotacian seller logo" style="height: 75px; width: auto; margin-bottom: 0.5rem;">
          </a>
        </div>
        <p>Acceso exclusivo para fabricantes y proveedores de uniformes.</p>
      </div>

      <form class="auth-form">
        <div id="login-error-alert" style="display: none; background: #FEF2F2; border: 1.5px solid #FCA5A5; color: #991B1B; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 500; align-items: center; gap: 0.75rem;">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-message-text"></span>
        </div>
        <div class="form-group">
          <label for="email">Correo Corporativo</label>
          <input type="email" id="email" placeholder="comercial@fabrica.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div style="position: relative;">
            <input type="password" id="password" placeholder="••••••••" required style="padding-right: 3rem;">
            <button type="button" onclick="togglePasswordVisibility('password', this)" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94A3B8; display: flex; align-items: center; justify-content: center; padding: 0;">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: -0.5rem; margin-bottom: 1rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8125rem; color: var(--color-text-secondary); cursor: pointer;">
            <input type="checkbox" id="remember" style="accent-color: var(--color-brand-accent); width: 1rem; height: 1rem; cursor: pointer;">
            Recordarme
          </label>
          <a href="#" style="font-size: 0.8125rem; color: var(--color-brand-accent);">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Acceder al Portal Seller</button>
      </form>

      <div class="auth-footer">
        ¿Quieres ser proveedor? <a href="onboarding.seller.html">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/utils.js"></script>

  <script>
    const SUPABASE_URL = 'https://awuhvewotmwelurmjvmu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4WG86Fal8RQ3tV0sNXZIow_hikHt0Aq';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    const loginForm = document.querySelector('.auth-form');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Verificando credenciales...';

        const errorAlert = document.getElementById('login-error-alert');
        const errorText = document.getElementById('error-message-text');
        errorAlert.style.display = 'none';

        try {
          const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (error) {
            errorText.textContent = 'Credenciales inválidas para el portal seller.';
            errorAlert.style.display = 'flex';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Acceder al Portal Seller';
            return;
          }

          showToast('¡Bienvenido!', 'Sesión iniciada correctamente', 'success');
          
          setTimeout(() => {
            window.location.href = 'portal.seller.html';
          }, 1000);

        } catch (err) {
          showToast('Error', 'Hubo un fallo en la conexión.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Acceder al Portal Seller';
        }
      });
    }
  </script>
</body>
</html>
