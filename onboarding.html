<!DOCTYPE html>
<html lang="es">

<head>
  <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dotacian | Configuración Inicial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- SDKs & Utils -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/utils.js"></script>

  <style>
    /* =============================================
       PREMIUM CONVERSATIONAL ONBOARDING STYLES
    ============================================= */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: #080A10;
      color: #F8FAFC;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Ambient Glow Backgrounds */
    .ambient-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 1;
    }

    .ambient-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(8, 145, 178, 0.15) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 1;
    }

    .onboarding-shell {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      padding: 2rem 1.5rem;
    }

    /* Header Logo */
    .ob-header {
      position: absolute;
      top: 0.5rem;
      left: 3rem;
      z-index: 10;
    }

    .ob-logo img {
      height: 115px;
      width: auto;
      display: block;
    }

    /* Conversational Container */
    .chat-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 4rem;
    }

    /* AI Avatar / Orb Section */
    .ai-orb-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }

    .ai-orb-container {
      position: relative;
      width: 84px;
      height: 84px;
    }

    .ai-orb-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px dashed rgba(6, 182, 212, 0.3);
      animation: spin 16s linear infinite;
    }

    .ai-orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #22D3EE 0%, #0891B2 50%, #0369A1 100%);
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.3);
      animation: floatOrb 4s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .ai-orb::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 100%);
      border-radius: 50%;
    }

    /* Orb Status Animations */
    @keyframes floatOrb {

      0%,
      100% {
        transform: translateY(0px) scale(1);
      }

      50% {
        transform: translateY(-8px) scale(1.03);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .ai-orb.thinking {
      animation: orbPulse 1.2s ease-in-out infinite alternate;
      background: radial-gradient(circle at 30% 30%, #38BDF8 0%, #0284C7 50%, #075985 100%);
      box-shadow: 0 0 35px rgba(56, 189, 248, 0.7);
    }

    @keyframes orbPulse {
      from {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      }

      to {
        transform: scale(1.08);
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.9);
      }
    }

    /* Agent Identity Name */
    .agent-name {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: #06B6D4;
      text-transform: lowercase;
      letter-spacing: 0.05em;
    }

    /* Message Bubbles */
    .message-bubble {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 1.5rem;
      padding: 2.25rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .ai-text {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      line-height: 1.45;
      font-weight: 600;
      color: #F1F5F9;
      margin-bottom: 0.5rem;
    }

    .ai-subtext {
      font-size: 0.95rem;
      color: #94A3B8;
      line-height: 1.5;
    }

    /* Typewriter animation support class */
    .typing::after {
      content: '|';
      animation: blinkCursor 0.8s infinite;
      color: #06B6D4;
      margin-left: 2px;
    }

    @keyframes blinkCursor {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* Input Field Panel (The user's response card) */
    .interactive-panel {
      margin-top: 1.5rem;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: none;
    }

    .interactive-panel.active {
      display: block;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Modern Inputs */
    .input-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .input-wrapper label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .modern-input {
      width: 100%;
      padding: 1.1rem 1.4rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      font-size: 1.05rem;
      font-family: inherit;
      color: white;
      outline: none;
      transition: all 0.3s;
    }

    .modern-input:focus {
      background: rgba(255, 255, 255, 0.05);
      border-color: #06B6D4;
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
    }

    /* Side-by-Side Grid */
    .input-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    /* High-Fidelity Country Selector Cards */
    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .country-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .country-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(6, 182, 212, 0.4);
      transform: translateY(-4px);
    }

    .country-card.selected {
      background: rgba(6, 182, 212, 0.06);
      border-color: #06B6D4;
      box-shadow: 0 10px 30px rgba(6, 182, 212, 0.15);
    }

    .country-flag {
      font-size: 2.75rem;
      margin-bottom: 0.75rem;
      display: block;
      transition: transform 0.3s;
    }

    .country-card:hover .country-flag {
      transform: scale(1.15) rotate(4deg);
    }

    .country-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #E2E8F0;
    }

    .country-card.selected .country-name {
      color: #22D3EE;
    }

    /* Action Buttons */
    .btn-glow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1.25rem;
      background: #06B6D4;
      color: #080A10;
      border: none;
      border-radius: 1.1rem;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
    }

    .btn-glow:hover {
      background: #22D3EE;
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(6, 182, 212, 0.5);
    }

    .btn-glow:disabled {
      background: #1E293B;
      color: #64748B;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-glow svg {
      transition: transform 0.3s;
    }

    .btn-glow:hover svg {
      transform: translateX(4px);
    }

    /* Password Input Helper */
    .eye-toggle {
      position: absolute;
      right: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #64748B;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.2s;
    }

    .eye-toggle:hover {
      color: #94A3B8;
    }

    .password-error-msg {
      color: #EF4444;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
      display: none;
      line-height: 1.4;
    }

    /* Back Link & Footer Utility */
    .ob-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748B;
    }

    .ob-footer a {
      color: #06B6D4;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .ob-footer a:hover {
      color: #22D3EE;
    }

    /* Custom Loading Orb Screen */
    .loading-status-text {
      font-size: 0.95rem;
      color: #64748B;
      font-style: italic;
      margin-top: 0.5rem;
      animation: pulseText 1.5s infinite alternate;
    }

    @keyframes pulseText {
      from {
        opacity: 0.5;
      }

      to {
        opacity: 1;
      }
    }

    /* Toast styling */
    .toast-container {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 9999;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .ob-header {
        position: static;
        margin-bottom: 2rem;
      }

      .chat-container {
        margin-top: 0;
      }

      .input-grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- Background Ambience -->
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <div class="onboarding-shell">
    <!-- Header Logo -->
    <header class="ob-header">
      <div class="ob-logo">
        <a href="index.html">
          <img src="assets/logos/logo_dotacian.png" alt="dotacian">
        </a>
      </div>
    </header>

    <div class="chat-container">
      <!-- AI Orb Avatar -->
      <div class="ai-orb-section">
        <div class="ai-orb-container">
          <div class="ai-orb-ring"></div>
          <div id="agent-orb" class="ai-orb"></div>
        </div>
        <div class="agent-name">dot</div>
      </div>

      <!-- Main Message Bubble (Dynamic Conversational Text) -->
      <div class="message-bubble">
        <div id="ai-chat-bubble" class="ai-text typing">Cargando asistente...</div>
        <div id="ai-chat-subbubble" class="ai-subtext"></div>

        <!-- STEP 0: Welcome -->
        <div id="panel-0" class="interactive-panel active">
          <button class="btn-glow" onclick="nextStep(1)">
            Comenzar Configuración
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14m-7-7 7 7-7 7" />
            </svg>
          </button>

          <div class="ob-footer">
            ¿Ya tienes una cuenta registrada? <a href="login.html">Inicia sesión</a>
          </div>
        </div>

        <!-- STEP 1: Personal Name -->
        <div id="panel-1" class="interactive-panel">
          <div class="input-grid-2">
            <div class="input-wrapper">
              <label for="firstName">Tu Nombre</label>
              <input type="text" id="firstName" class="modern-input" placeholder="Ej. Ana" autocomplete="off"
                oninput="validateStep1()">
            </div>
            <div class="input-wrapper">
              <label for="lastName">Tu Apellido</label>
              <input type="text" id="lastName" class="modern-input" placeholder="Ej. García" autocomplete="off"
                oninput="validateStep1()">
            </div>
          </div>

          <div class="input-wrapper" style="margin-top: 1rem; margin-bottom: 1.5rem; text-align: left;">
            <label for="preferredName">¿Cómo te gusta que te llamen?</label>
            <input type="text" id="preferredName" class="modern-input" placeholder="Ej. Ani / Juanito"
              autocomplete="off" oninput="validateStep1()">
          </div>

          <button id="btn-next-1" class="btn-glow" onclick="nextStep(2)" disabled>
            Continuar
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14m-7-7 7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- STEP 2: Corporate Email -->
        <div id="panel-2" class="interactive-panel">
          <div class="input-wrapper">
            <label for="email">Correo Electrónico Corporativo</label>
            <input type="email" id="email" class="modern-input" placeholder="ana@empresa.com" autocomplete="off"
              oninput="validateStep2()">
          </div>

          <button id="btn-next-2" class="btn-glow" onclick="nextStep(3)" disabled>
            Continuar
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14m-7-7 7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- STEP 3: Account Passwords -->
        <div id="panel-3" class="interactive-panel">
          <div class="input-grid-2">
            <div class="input-wrapper">
              <label for="password">Contraseña</label>
              <div style="position: relative;">
                <input type="password" id="password" class="modern-input" placeholder="Min. 6 caracteres"
                  oninput="validateStep3()">
                <button type="button" class="eye-toggle" onclick="togglePassword('password', this)">
                  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>
            <div class="input-wrapper">
              <label for="confirmPassword">Confirmar Contraseña</label>
              <div style="position: relative;">
                <input type="password" id="confirmPassword" class="modern-input" placeholder="Repite contraseña"
                  oninput="validateStep3()">
                <button type="button" class="eye-toggle" onclick="togglePassword('confirmPassword', this)">
                  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div id="passwordError" class="password-error-msg">Las contraseñas no coinciden, revisa nuevamente.</div>

          <button id="btn-next-3" class="btn-glow" onclick="nextStep(4)" disabled>
            Continuar
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14m-7-7 7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- STEP 4: Country Selector -->
        <div id="panel-4" class="interactive-panel">
          <div class="country-grid">
            <div class="country-card" id="country-mx" onclick="selectCountry('México', 'country-mx')">
              <span class="country-flag">🇲🇽</span>
              <span class="country-name">México</span>
            </div>
            <div class="country-card" id="country-co" onclick="selectCountry('Colombia', 'country-co')">
              <span class="country-flag">🇨🇴</span>
              <span class="country-name">Colombia</span>
            </div>
          </div>

          <button id="btn-next-4" class="btn-glow" onclick="submitOnboarding()" disabled>
            Crear cuenta y continuar
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14m-7-7 7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- STEP 5: Loading / AI Processing -->
        <div id="panel-5" class="interactive-panel" style="text-align: center;">
          <div id="loadingStatusText" class="loading-status-text">Iniciando perfil seguro...</div>
        </div>

      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    // Conversational Dialogue Configuration
    const stepsConfig = {
      0: {
        text: "¡Hola! Soy dot, tu asistente inteligente.",
        subtext: "Estoy aquí para guiarte en tu registro inicial. ¿Comenzamos?"
      },
      1: {
        text: "Encantado. Para iniciar tu perfil, ¿cuál es tu nombre y apellido?",
        subtext: "Ingresa tu nombre y apellido para poder identificarte más fácil."
      },
      2: {
        text: "Excelente, {name}. ¿Qué dirección de correo corporativo utilizaremos?",
        subtext: "Este será tu correo de acceso principal al sistema dotacian y donde recibirás reportes automatizados."
      },
      3: {
        text: "¡Perfecto! Ahora definamos una clave secreta para tu perfil.",
        subtext: "Tu contraseña debe contar con al menos 6 caracteres combinando números o símbolos para mayor seguridad."
      },
      4: {
        text: "Último detalle, ¿dónde opera principalmente tu empresa?",
        subtext: "Selecciona el país operativo para configurar los presupuestos, monedas y formatos oficiales correspondientes."
      },
      5: {
        text: "Creando tu cuenta y bases de datos...",
        subtext: "Estamos configurando tu entorno de trabajo seguro. Esto tomará solo unos segundos..."
      }
    };

    let currentStep = 0;
    let selectedCountryVal = null;
    let userId = null;
    let typingTimer = null;

    // Supabase Configuration
    const SUPABASE_URL = 'https://awuhvewotmwelurmjvmu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4WG86Fal8RQ3tV0sNXZIow_hikHt0Aq';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Initial Trigger
    window.onload = () => {
      triggerChatStep(0);
    };

    // Elegant Typewriter Logic
    function triggerChatStep(step) {
      currentStep = step;
      const textContainer = document.getElementById('ai-chat-bubble');
      const subtextContainer = document.getElementById('ai-chat-subbubble');

      // Hide all panels during writing
      document.querySelectorAll('.interactive-panel').forEach(p => p.classList.remove('active'));

      let rawText = stepsConfig[step].text;
      if (step === 2) {
        const preferredName = document.getElementById('preferredName').value.trim();
        rawText = rawText.replace('{name}', preferredName);
      }

      subtextContainer.style.opacity = 0;
      subtextContainer.textContent = stepsConfig[step].subtext;

      textContainer.textContent = "";
      textContainer.classList.add('typing');

      let charIdx = 0;
      if (typingTimer) clearInterval(typingTimer);

      typingTimer = setInterval(() => {
        textContainer.textContent += rawText.charAt(charIdx);
        charIdx++;
        if (charIdx >= rawText.length) {
          clearInterval(typingTimer);
          textContainer.classList.remove('typing');

          // Show subtext and active input panel
          subtextContainer.style.transition = "opacity 0.4s ease";
          subtextContainer.style.opacity = 1;

          const targetPanel = document.getElementById(`panel-${step}`);
          if (targetPanel) {
            targetPanel.classList.add('active');
          }
        }
      }, 15);
    }

    function nextStep(step) {
      triggerChatStep(step);
    }

    // Input Validations
    function validateStep1() {
      const fName = document.getElementById('firstName').value.trim();
      const lName = document.getElementById('lastName').value.trim();
      const pName = document.getElementById('preferredName').value.trim();
      const btn = document.getElementById('btn-next-1');
      btn.disabled = !(fName.length > 0 && lName.length > 0 && pName.length > 0);
    }

    function validateStep2() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('btn-next-2');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      btn.disabled = !emailRegex.test(email);
    }

    function validateStep3() {
      const pass = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('btn-next-3');
      const errEl = document.getElementById('passwordError');

      if (pass.length >= 6 && confirm.length > 0) {
        if (pass !== confirm) {
          errEl.style.display = 'block';
          btn.disabled = true;
        } else {
          errEl.style.display = 'none';
          btn.disabled = false;
        }
      } else {
        errEl.style.display = 'none';
        btn.disabled = true;
      }
    }

    function selectCountry(country, cardId) {
      selectedCountryVal = country;
      document.querySelectorAll('.country-card').forEach(c => c.classList.remove('selected'));
      document.getElementById(cardId).classList.add('selected');
      document.getElementById('btn-next-4').disabled = false;
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    // Supabase Submission Process
    async function submitOnboarding() {
      const fName = document.getElementById('firstName').value.trim();
      const lName = document.getElementById('lastName').value.trim();
      const pName = document.getElementById('preferredName').value.trim();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;

      triggerChatStep(5);

      const orb = document.getElementById('agent-orb');
      orb.classList.add('thinking');

      const statusEl = document.getElementById('loadingStatusText');
      const messages = [
        'Enviando credenciales seguras...',
        'Inicializando tu perfil administrativo...',
        'Configurando tablas corporativas...',
        'Creando portal dotacian...'
      ];

      let msgIdx = 0;
      const statusTimer = setInterval(() => {
        msgIdx++;
        if (msgIdx < messages.length) {
          statusEl.textContent = messages[msgIdx];
        }
      }, 700);

      try {
        // Sign Up with Supabase Auth
        const { data: authData, error: authError } = await _supabase.auth.signUp({
          email: email,
          password: pass,
          options: {
            data: { first_name: fName, last_name: lName, nickname: pName }
          }
        });

        if (authError) throw authError;
        if (!authData.user) throw new Error('No se recibió información válida del usuario.');

        userId = authData.user.id;

        // Save to user_profile
        const profileData = {
          id: userId,
          first_name: fName,
          last_name: lName,
          nickname: pName,
          email: email,
          country: selectedCountryVal,
          created_at: new Date().toISOString()
        };

        const { error: profileError } = await _supabase
          .from('user_profile')
          .upsert([profileData], { onConflict: 'id' });

        if (profileError) throw profileError;

        clearInterval(statusTimer);
        statusEl.textContent = "¡Todo listo! Ingresando a tu dashboard...";
        showToast('¡Éxito!', 'Cuenta creada correctamente.', 'success');

        orb.classList.remove('thinking');
        orb.style.boxShadow = "0 0 40px #10B981";
        orb.style.background = "radial-gradient(circle at 30% 30%, #34D399 0%, #059669 50%, #064E3B 100%)";

        setTimeout(() => {
          window.location.href = 'app.html';
        }, 1200);

      } catch (err) {
        clearInterval(statusTimer);
        orb.classList.remove('thinking');
        orb.style.boxShadow = "0 0 40px #EF4444";
        orb.style.background = "radial-gradient(circle at 30% 30%, #F87171 0%, #DC2626 50%, #7F1D1D 100%)";

        statusEl.innerHTML = `<span style="color: #EF4444;">Error en el registro: ${err.message || 'Inténtalo de nuevo.'}</span>`;
        showToast('Error', err.message || 'Fallo en el registro', 'error');

        setTimeout(() => {
          triggerChatStep(4);
          orb.style.boxShadow = "";
          orb.style.background = "";
        }, 3000);
      }
    }

    function showToast(title, message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.cssText = "background: #1E293B; border-left: 4px solid " + (type === 'error' ? '#EF4444' : '#06B6D4') + "; padding: 1rem 1.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; min-width: 320px; color: white;";

      toast.innerHTML = `
        <div>
          <div style="font-weight: 800; font-size: 0.9rem;">${title}</div>
          <div style="font-size: 0.8rem; color: #94A3B8;">${message}</div>
        </div>
      `;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }
  </script>
