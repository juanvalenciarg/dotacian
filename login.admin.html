<!DOCTYPE html>
<html lang="es">

<head>
  <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión admin | Dotacian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html,
    body {
      background: #FFFFFF !important;
      /* Forzamos blanco total en toda la estructura */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      width: 100%;
      font-family: 'Inter', sans-serif;
    }

    .auth-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF !important;
      padding: 2rem;
      box-sizing: border-box;
    }

    .auth-card {
      background: #0F172A;
      /* Cuadro azul noche */
      color: white;
      width: 100%;
      max-width: 460px;
      border-radius: 3rem;
      padding: 4rem 3.5rem;
      box-shadow: 0 40px 80px -20px rgba(15, 23, 42, 0.25);
      position: relative;
      z-index: 10;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .admin-badge {
      display: inline-block;
      background: rgba(6, 182, 212, 0.15);
      color: var(--color-cyan);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      font-family: 'Outfit', sans-serif;
    }

    .logo img {
      height: 42px;
      width: auto;
      margin-bottom: 1rem;
      filter: brightness(0) invert(1);
      /* Logo blanco para fondo azul */
    }

    .auth-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      color: white;
      margin: 0.5rem 0;
      letter-spacing: -0.02em;
    }

    .auth-header p {
      color: #94A3B8;
      font-size: 0.9375rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #94A3B8;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.25rem;
      font-size: 0.95rem;
      color: white;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-group input:focus {
      border-color: var(--color-cyan);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .btn-admin {
      width: 100%;
      padding: 1rem;
      background: var(--color-cyan);
      color: white;
      border: none;
      border-radius: 1.25rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
      font-family: 'Outfit', sans-serif;
    }

    .btn-admin:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.2);
    }

    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #94A3B8;
    }

    .auth-footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Error Alert */
    #login-error-alert {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FEE2E2;
      color: #B91C1C;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      align-items: center;
      gap: 0.75rem;
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="admin-badge">Admin Portal</div>
        <div class="logo">
          <a href="index.html">
            <img src="assets/logos/logo_dotacian.png" alt="dotacian logo">
          </a>
        </div>
        <h2>Centro de Control</h2>
        <p>Inicia sesión para gestionar perfiles,<br>empresas y talleres asociados.</p>
      </div>

      <form class="auth-form">
        <div id="login-error-alert">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-message-text"></span>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="admin@dotacian.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div style="position: relative;">
            <input type="password" id="password" placeholder="••••••••" required style="padding-right: 3rem;">
            <button type="button" onclick="togglePasswordVisibility('password', this)"
              style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94A3B8; display: flex; align-items: center; justify-content: center; padding: 0;">
              <svg id="eye-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-admin">
          Acceder al Panel
        </button>
      </form>

      <div class="auth-footer">
        ¿No eres administrador? <a href="login.html">Regresar al portal de clientes</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/utils.js?v=4"></script>

  <script>
    const SUPABASE_URL = 'https://awuhvewotmwelurmjvmu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4WG86Fal8RQ3tV0sNXZIow_hikHt0Aq';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { storageKey: window.location.pathname.includes('.seller.html') || window.location.pathname.includes('seller') ? 'dotacian-seller-token' : 'dotacian-client-token' } });

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('error') === 'unauthorized') {
        const errorAlert = document.getElementById('login-error-alert');
        const errorText = document.getElementById('error-message-text');
        errorText.textContent = 'Tu sesión fue cerrada porque no tienes privilegios de administrador.';
        errorAlert.style.display = 'flex';

        // Limpiar la URL para que no persista el mensaje si recarga
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    });

    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    const loginForm = document.querySelector('.auth-form');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('.btn-admin');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Verificando...';

        const errorAlert = document.getElementById('login-error-alert');
        const errorText = document.getElementById('error-message-text');
        errorAlert.style.display = 'none';

        try {
          const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (authError) {
            errorText.textContent = 'Credenciales no autorizadas o incorrectas.';
            errorAlert.style.display = 'flex';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Acceder al Panel';
            return;
          }

          // Verificar si el usuario está en admin_profile
          const userId = authData.user.id;
          const { data: adminData, error: adminError } = await _supabase
            .from('admin_profile')
            .select('*')
            .eq('id', userId)
            .maybeSingle();

          if (adminError || !adminData) {
            // No es administrador, cerramos sesión
            await _supabase.auth.signOut();
            errorText.textContent = 'Acceso denegado: No tienes privilegios de administrador.';
            errorAlert.style.display = 'flex';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Acceder al Panel';
            return;
          }

          window.location.href = 'admin.html';

        } catch (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Acceder al Panel';
        }
      });
    }
    // Comprobar si hubo un rebote por timeout
    const urlParams = new URLSearchParams(window.location.search);
    const reason = urlParams.get('reason');
    if (reason === 'timeout') {
      const errorAlert = document.getElementById('login-error-alert');
      const errorText = document.getElementById('error-message-text');
      if (errorAlert && errorText) {
        errorText.textContent = 'Tu sesión se cerro por seguridad, vuelve a iniciar sesión';
        errorAlert.style.background = '#FFFBEB';
        errorAlert.style.color = '#D97706';
        errorAlert.style.borderColor = '#FCD34D';
        errorAlert.style.display = 'flex';
      }
    }
  </script>
</body>

</html>
