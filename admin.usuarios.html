<!DOCTYPE html>
<html lang="es">

<head>
  <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dotacian | Control Interno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .search-container {
      background: white;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: flex-end;
    }

    .search-input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .search-input-group label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-navy);
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #E2E8F0;
      border-radius: 0.5rem;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--color-brand-primary);
    }

    .user-card {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: none;
      /* Oculto por defecto */
    }

    .user-card.active {
      display: block;
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #E2E8F0;
    }

    .role-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-client {
      background: #DBEAFE;
      color: #1E40AF;
    }

    .role-seller {
      background: #D1FAE5;
      color: #065F46;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    .form-control {
      padding: 0.75rem;
      border: 1px solid #E2E8F0;
      border-radius: 0.5rem;
      font-family: inherit;
    }

    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #E2E8F0;
    }

    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
    }

    /* Dashboard Styles */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .metric-card {
      background: white;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .metric-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .metric-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #64748B;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: #0F172A;
      font-family: 'Outfit', sans-serif;
    }

    .metric-icon {
      width: 40px;
      height: 40px;
      border-radius: 0.75rem;
      background: #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      background: white;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: #F8FAFC;
      border-radius: 0.5rem;
      border-left: 4px solid #CBD5E1;
    }

    .status-item.pending {
      border-left-color: #F59E0B;
    }

    .status-item.approved {
      border-left-color: #3B82F6;
    }

    .status-item.production {
      border-left-color: #8B5CF6;
    }

    .status-item.shipped {
      border-left-color: #06B6D4;
    }

    .status-item.delivered {
      border-left-color: #10B981;
    }

    .status-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #334155;
      text-transform: capitalize;
    }

    .status-count {
      font-size: 1.125rem;
      font-weight: 700;
      color: #0F172A;
    }
  </style>
</head>

<body>
  <div class="app-layout admin-dark">
    <!-- Sidebar -->
    <aside class="sidebar" style="background-color: #020617;">
      <div class="sidebar-brand" style="padding: 1.5rem 2rem;">
        <a href="admin.html">
          <img src="assets/logos/logo_dotacian_admin.png" alt="dotacian admin"
            style="width: 100%; max-width: 180px; height: auto; display: block;">
        </a>
      </div>
      <nav class="sidebar-nav">
        <a href="admin.html" id="nav-dashboard" class="nav-item"><span>📊</span> Dashboard</a>
        <a href="admin.usuarios.html" id="nav-users" class="nav-item active"><span>👥</span> Gestión de Usuarios</a>
        <a href="facturas.admin.html" class="nav-item"><span>💸</span> Facturación</a>
        <a href="#" class="nav-item"><span>🛠️</span> Logs de Sistema</a>
        <a href="#" class="nav-item"><span>🛡️</span> Seguridad</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="app-header">
        <h1 id="pageTitle">Gestión de Usuarios</h1>
        <div class="algo-status">
          <span style="color: var(--color-cyan);">●</span> Panel Administrativo
        </div>
      </header>

      <div class="app-container">
        
        <!-- Vista de Gestión de Usuarios -->
        <div id="userManagementView">
        <!-- End Vista del Dashboard -->
          <!-- Buscador -->
          <div class="search-container">
            <div class="search-input-group">
              <label for="searchEmail">Buscar usuario por correo electrónico</label>
              <input type="email" id="searchEmail" class="search-input" placeholder="ejemplo@correo.com">
            </div>
            <button class="btn btn-primary" onclick="searchUser()" id="btnSearch">Buscar Usuario</button>
          </div>

          <!-- Tarjeta de Resultados (Oculta) -->
          <div id="userCard" class="user-card">
            <div class="user-header">
              <div>
                <h2 id="cardTitle"
                  style="margin: 0; font-family: var(--font-family-heading); color: var(--color-navy);">Datos del
                  Usuario</h2>
                <p id="cardEmail" style="margin: 0; color: var(--color-text-secondary); font-size: 0.875rem;">-</p>
              </div>
              <span id="cardRole" class="role-badge role-client">Cliente</span>
            </div>

            <div class="form-grid">
              <!-- Datos Personales -->
              <div class="form-group" style="grid-column: 1 / -1; margin-bottom: 0.5rem; border-bottom: 1px solid #E2E8F0; padding-bottom: 0.5rem;">
                <h3 style="font-size: 1rem; color: #0F172A; margin: 0;">Datos Básicos</h3>
              </div>
              <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="editFirstName" class="form-control">
              </div>
              <div class="form-group">
                <label>Apellido</label>
                <input type="text" id="editLastName" class="form-control">
              </div>
              <div class="form-group" id="nicknameGroup">
                <label>Apodo / Nickname</label>
                <input type="text" id="editNickname" class="form-control">
              </div>
              <div class="form-group">
                <label>País</label>
                <input type="text" id="editCountry" class="form-control" placeholder="MX o CO">
              </div>

              <!-- Registro y Actividad -->
              <div class="form-group" style="grid-column: 1 / -1; margin-top: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #E2E8F0; padding-bottom: 0.5rem;">
                <h3 style="font-size: 1rem; color: #0F172A; margin: 0;">Registro y Tiempos</h3>
              </div>
              <div class="form-group">
                <label>Fecha de Registro</label>
                <div id="viewCreatedAt" style="font-weight: 600; color: #334155;">--</div>
              </div>
              <div class="form-group">
                <label>Último Ingreso</label>
                <div id="viewLastLogin" style="font-weight: 600; color: #334155;">--</div>
              </div>

              <!-- Empresa y Sector -->
              <div class="form-group" style="grid-column: 1 / -1; margin-top: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #E2E8F0; padding-bottom: 0.5rem;">
                <h3 style="font-size: 1rem; color: #0F172A; margin: 0;">Empresa y Transacciones</h3>
              </div>
              <div class="form-group">
                <label>Empresa Asociada</label>
                <div id="viewCompany" style="font-weight: 600; color: #334155;">--</div>
              </div>
              <div class="form-group">
                <label>Sector / Industria</label>
                <div id="viewIndustry" style="font-weight: 600; color: #334155;">--</div>
              </div>
              <div class="form-group">
                <label>Cotizaciones</label>
                <div id="viewQuotes" style="font-weight: 600; color: #334155;">--</div>
              </div>
              <div class="form-group">
                <label>Órdenes de Compra</label>
                <div id="viewOrders" style="font-weight: 600; color: #334155;">--</div>
              </div>
            </div>

            <div class="actions-bar">
              <button class="btn btn-outline" style="border-color: #EF4444; color: #EF4444;" onclick="resetPassword()">
                Enviar correo de cambio de contraseña
              </button>
              <button class="btn btn-primary" onclick="saveUser()">
                Guardar Cambios
              </button>
            </div>
          </div>

        </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="assets/js/utils.js?v=4"></script>
  <script>
    const SUPABASE_URL = 'https://awuhvewotmwelurmjvmu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4WG86Fal8RQ3tV0sNXZIow_hikHt0Aq';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { storageKey: 'dotacian-client-token' } });

    let currentUserRecord = null;
    let currentUserType = null; // 'client' or 'seller'

    // Validación de sesión administrativa
    async function checkAdminAuth() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.admin.html';
        return;
      }

      // Validar que exista en admin_profile
      const { data: adminData, error } = await _supabase
        .from('admin_profile')
        .select('id')
        .eq('id', session.user.id)
        .maybeSingle();

      if (error || !adminData) {
        await _supabase.auth.signOut();
        window.location.href = 'login.admin.html?error=unauthorized';
      }
    }

    // Ejecutar validación inmediatamente
    checkAdminAuth();

    async function searchUser() {
      const email = document.getElementById('searchEmail').value.trim();
      if (!email) {
        showToast('Atención', 'Por favor ingresa un correo.', 'error');
        return;
      }

      const btn = document.getElementById('btnSearch');
      btn.textContent = 'Buscando...';
      btn.disabled = true;
      document.getElementById('userCard').classList.remove('active');

      try {
        const { data, error } = await _supabase.rpc('get_user_admin_details', { search_email: email });

        if (error) {
          throw error;
        }

        if (data && data.found) {
          fillCard(data);
        } else {
          showToast('No encontrado', 'No se encontró ningún usuario con ese correo.', 'error');
        }

      } catch (err) {
        console.error("Error buscando usuario:", err);
        showToast('Error', 'Hubo un error en la búsqueda (Asegúrate de haber creado el RPC en Supabase).', 'error');
      } finally {
        btn.textContent = 'Buscar Usuario';
        btn.disabled = false;
      }
    }

    function formatDate(isoString) {
      if (!isoString) return 'No registrado';
      return new Date(isoString).toLocaleString('es-MX', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function fillCard(data) {
      currentUserRecord = data;
      currentUserType = data.role;

      document.getElementById('cardEmail').textContent = data.email;

      const roleBadge = document.getElementById('cardRole');
      if (data.role === 'client') {
        roleBadge.textContent = 'Cliente';
        roleBadge.className = 'role-badge role-client';
        document.getElementById('nicknameGroup').style.display = 'flex';
        document.getElementById('editNickname').value = data.profile?.nickname || '';
      } else {
        roleBadge.textContent = 'Fabricante';
        roleBadge.className = 'role-badge role-seller';
        document.getElementById('nicknameGroup').style.display = 'none';
      }

      document.getElementById('editFirstName').value = data.profile?.first_name || '';
      document.getElementById('editLastName').value = data.profile?.last_name || '';
      document.getElementById('editCountry').value = data.profile?.country || '';

      // Tiempos
      document.getElementById('viewCreatedAt').textContent = formatDate(data.created_at);
      document.getElementById('viewLastLogin').textContent = formatDate(data.last_sign_in_at);

      // Empresa
      if (data.role === 'client') {
        document.getElementById('viewCompany').textContent = data.company?.company_name || 'Sin registro';
        document.getElementById('viewIndustry').textContent = data.company?.industry || 'Sin sector';
      } else {
        document.getElementById('viewCompany').textContent = data.company?.seller_name || 'Sin registro';
        document.getElementById('viewIndustry').textContent = 'Fabricante'; // Sellers generally don't have industry in the same way
      }

      // Transacciones
      document.getElementById('viewQuotes').textContent = data.quotes_count > 0 ? "Sí (" + data.quotes_count + ")" : 'No';
      
      const ordersBadge = document.getElementById('viewOrders');
      if (data.orders_count > 0) {
        ordersBadge.innerHTML = '<span style="color: #10B981;">Sí (' + data.orders_count + ')</span>';
      } else {
        ordersBadge.textContent = 'No';
      }

      document.getElementById('userCard').classList.add('active');
    }

    async function saveUser() {
      if (!currentUserRecord || !currentUserType) return;

      const fName = document.getElementById('editFirstName').value.trim();
      const lName = document.getElementById('editLastName').value.trim();
      const country = document.getElementById('editCountry').value.trim();

      let updatePayload = {
        first_name: fName,
        last_name: lName,
        country: country
      };

      let table = currentUserType === 'client' ? 'user_profile' : 'seller_profile';

      if (currentUserType === 'client') {
        updatePayload.nickname = document.getElementById('editNickname').value.trim();
      }

      try {
        const { error } = await _supabase
          .from(table)
          .update(updatePayload)
          .eq('id', currentUserRecord.user_id);

        if (error) throw error;
        showToast('Éxito', 'Perfil actualizado correctamente.', 'success');
      } catch (err) {
        console.error(err);
        showToast('Error', 'No se pudo actualizar el perfil.', 'error');
      }
    }

    async function resetPassword() {
      if (!currentUserRecord) return;
      const email = currentUserRecord.email;

      if (!confirm(`¿Estás seguro de enviar un enlace de recuperación a ${email}?`)) return;

      try {
        const { data, error } = await _supabase.auth.resetPasswordForEmail(email);
        if (error) throw error;

        showToast('Enviado', `Correo de recuperación enviado a ${email}.`, 'success');
      } catch (err) {
        console.error("Error resetting password:", err);
        showToast('Error', 'No se pudo enviar el correo de recuperación.', 'error');
      }
    }

    function showToast(title, message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.style.cssText = "background: white; border-left: 4px solid " + (type === 'error' ? '#EF4444' : '#10B981') + "; padding: 1rem 1.5rem; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; min-width: 300px;";
      toast.innerHTML = `
        <div>
          <div style="font-weight: 700; font-size: 0.9rem; color: #0F172A;">${title}</div>
          <div style="font-size: 0.875rem; color: #64748B;">${message}</div>
        </div>
      `;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    }
  </script>
</body>

</html>
