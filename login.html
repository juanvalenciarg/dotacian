<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iniciar sesión | dotacian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">
          <a href="index.html">dotacian</a>
        </div>
        <p>Gestiona la gestión y entrega de uniformes con inteligencia.</p>
      </div>

      <form class="auth-form" action="app.html">
        <div id="login-error-alert" style="display: none; background: #FEF2F2; border: 1.5px solid #FCA5A5; color: #991B1B; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 500; align-items: center; gap: 0.75rem;">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-message-text"></span>
        </div>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@empresa.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div style="display: flex; justify-content: flex-end;">
          <a href="#" style="font-size: 0.8125rem; color: var(--color-brand-accent);">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Iniciar
          Sesión</button>
      </form>

      <div class="auth-footer">
        ¿Aún no eres cliente? <a href="index.html#agendar-demo">Agenda una demo</a>
      </div>
    </div>
  </div>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/utils.js"></script>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://awuhvewotmwelurmjvmu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4WG86Fal8RQ3tV0sNXZIow_hikHt0Aq';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginForm = document.querySelector('.auth-form');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Iniciando sesión...';

        const errorAlert = document.getElementById('login-error-alert');
        const errorText = document.getElementById('error-message-text');
        errorAlert.style.display = 'none';

        try {
          const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (error) {
            console.error('Login error:', error);
            let msg = 'Correo o contraseña incorrectos.';
            
            // Mensajes específicos según el error de Supabase
            if (error.message.includes('Email not confirmed')) {
              msg = 'Por favor, confirma tu correo electrónico.';
            } else if (error.status === 400 || error.message.includes('Invalid login credentials')) {
              msg = 'Credenciales inválidas. Revisa tu correo y contraseña.';
            }

            errorText.textContent = msg;
            errorAlert.style.display = 'flex';
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Iniciar Sesión';
            return;
          }

          showToast('¡Bienvenido!', 'Sesión iniciada correctamente', 'success');
          
          setTimeout(() => {
            window.location.href = 'app.html';
          }, 1000);

        } catch (err) {
          showToast('Error', 'Hubo un fallo en la conexión.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Iniciar Sesión';
        }
      });
    }
  </script>
</body>

</html>
